<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cotizador</title>

  <style>
    :root { --b:#e5e7eb; --t:#111827; --m:#6b7280; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:-apple-system,system-ui,Arial; background:#f7f7f8; color:var(--t); }
    .wrap{ max-width:1200px; margin:0 auto; padding:16px; display:grid; grid-template-columns:420px 1fr; gap:14px; }
    .card{ background:#fff; border:1px solid var(--b); border-radius:16px; padding:14px; box-shadow:0 6px 20px rgba(0,0,0,.05); }
    h1{ font-size:18px; margin:0 0 8px; }
    h2{ font-size:13px; margin:0 0 12px; color:var(--m); font-weight:600; }
    label{ font-size:12px; color:var(--m); display:block; margin:10px 0 6px; }
    input, select{ width:100%; padding:10px; border-radius:12px; border:1px solid var(--b); font-size:14px; }
    .row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btns{ display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
    button{ padding:10px 12px; border-radius:12px; border:1px solid var(--b); background:#111827; color:#fff; font-weight:700; cursor:pointer; }
    button.secondary{ background:#fff; color:#111827; }
    button:active{ transform:scale(.99); }
    .tip{ font-size:12px; color:var(--m); margin-top:8px; }

    /* Right (quote preview) */
    .quoteHeader{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    .brand{ display:flex; flex-direction:column; gap:6px; }
    .brand img{ height:70px; width:auto; object-fit:contain; }
    .small{ font-size:12px; color:var(--m); }
    .hr{ height:1px; background:var(--b); margin:12px 0; }
    .pill{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border:1px solid var(--b); border-radius:999px; font-size:12px; color:var(--m); }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    th{ text-align:left; font-size:12px; color:var(--m); padding:10px 8px; border-bottom:1px solid var(--b); }
    td{ padding:10px 8px; border-bottom:1px solid #f1f2f3; vertical-align:middle; }
    td.right, th.right{ text-align:right; }
    td.muted{ color:var(--m); font-size:13px; }
    td input{ padding:10px; border-radius:12px; border:1px solid var(--b); font-size:14px; }
    .totals{ margin-top:10px; display:grid; gap:6px; }
    .line{ display:flex; justify-content:space-between; align-items:center; color:var(--m); }
    .line span:last-child{ color:var(--t); font-weight:700; }
    .line.grand{ margin-top:6px; padding-top:8px; border-top:1px solid var(--b); font-weight:900; color:var(--t); }
    .warning{ margin-top:10px; padding:10px; border:1px solid #fde68a; background:#fffbeb; color:#92400e; border-radius:12px; font-size:12px; display:none; }

    /* Print */
    @media print{
      body{ background:#fff; }
      .wrap{ display:block; padding:0; }
      .card:first-child{ display:none; }
      .no-print{ display:none !important; }
      .card{ box-shadow:none; border:none; border-radius:0; padding:0; }
      table td input{ border:none; padding:0; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- LEFT: controls -->
    <div class="card">
      <h1>Cotizador</h1>
      <h2>Captura códigos, cantidades y genera PDF</h2>

      <div class="row">
        <div>
          <label>Lista del cliente</label>
          <select id="priceList">
            <option value="4">Lista 4</option>
            <option value="5">Lista 5</option>
            <option value="6">Lista 6</option>
          </select>
        </div>
        <div>
          <label>IVA</label>
          <select id="vatMode">
            <option value="16">16%</option>
            <option value="0">0%</option>
          </select>
        </div>
      </div>

      <label>Cliente</label>
      <input id="clientName" placeholder="Ej. Grupo López" />

      <label>Vendedor</label>
      <input id="sellerName" placeholder="Ej. Pedro Aguilar" />

      <div class="row">
        <div>
          <label>Tipo de cambio (USD→MXN)</label>
          <input id="fx" type="number" step="0.01" />
        </div>
        <div>
          <label>Vigencia</label>
          <input id="validity" />
        </div>
      </div>

      <div class="btns no-print">
        <button id="addRowBtn">+ Agregar renglón</button>
        <button class="secondary" id="clearBtn">Limpiar todo</button>
      </div>

      <div class="tip no-print">Tip: Imprimir → Guardar como PDF</div>

      <div class="warning" id="warningBox"></div>
    </div>

    <!-- RIGHT: quote preview -->
    <div class="card">
      <div class="quoteHeader">
        <div>
          <div class="brand">
            <!-- IMPORTANTE: el src debe ser EXACTO al nombre en GitHub -->
            <img src="Logo Tishman Color-SF.png" alt="Logo" onerror="this.style.display='none'">
          </div>
          <div class="small">Cotización</div>
        </div>

        <div style="text-align:right">
          <!-- Quitamos el badge de lista para que NO se vea -->
          <div class="small" style="margin-top:6px;">Fecha: <span id="today"></span></div>
          <div class="small">Vigencia: <span id="validityOut"></span></div>
        </div>
      </div>

      <div class="hr"></div>

      <div class="row" style="margin-bottom:10px;">
        <div>
          <div class="small muted">Cliente</div>
          <div style="font-weight:900" id="clientOut">—</div>
          <div class="small muted" style="margin-top:10px;">Tipo de cambio</div>
          <div style="font-weight:900" id="fxOut">$0.00</div>
        </div>

        <div>
          <div class="small muted">Vendedor</div>
          <div style="font-weight:900" id="sellerOut">—</div>
          <div class="small muted" style="margin-top:10px;">IVA</div>
          <div style="font-weight:900"><span id="vatOut">0</span>%</div>
        </div>
      </div>

      <div class="hr"></div>

      <table>
        <thead>
          <tr>
            <th style="width:22%;">Código</th>
            <th>Descripción</th>
            <th class="right" style="width:14%;">Precio (USD)</th>
            <th class="right" style="width:12%;">Cant.</th>
            <th class="right" style="width:14%;">SubTotal (USD)</th>
            <th class="right no-print" style="width:10%;">Quitar</th>
          </tr>
        </thead>
        <tbody id="lines"></tbody>
      </table>

      <div class="totals">
        <div class="line"><span>Sub Total USD</span><span id="subUsd">$0.00</span></div>
        <div class="line"><span>Total USD</span><span id="totalUsd">$0.00</span></div>
        <div class="line"><span>Sub Total MXP</span><span id="subMxn">$0.00</span></div>
        <div class="line"><span>IVA</span><span id="ivaMxn">$0.00</span></div>
        <div class="line grand"><span>TOTAL MXP</span><span id="totalMxn">$0.00</span></div>
      </div>

      <div class="btns no-print" style="margin-top:14px;">
        <button id="printBtn">Imprimir / Guardar PDF</button>
      </div>
    </div>
  </div>

  <!-- Catalog -->
  <script src="./catalog.js"></script>

  <script>
    // Helpers
    const $ = (id) => document.getElementById(id);

    function money(n){ return "$" + Number(n||0).toFixed(2); }
    function moneyUsd(n){ return "$" + Number(n||0).toFixed(2); }

    function escapeHtml(str){
      return String(str||"").replace(/[&<>"']/g, (m) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function showWarning(msg){
      const box = $("warningBox");
      if(!msg){ box.style.display="none"; box.textContent=""; return; }
      box.style.display="block";
      box.textContent = msg;
    }

    // --- Normalización de código (NO importa mayúsculas) ---
    function normCode(code){
      return String(code || "").trim().toUpperCase();
    }

    // Precio: PRIORIDAD precio especial (priceE), luego lista 4/5/6
    function priceFor(code, list){
      const key = normCode(code);
      const item = (window.CATALOG || {})[key];
      if(!item) return null;

      // precio especial primero
      if(item.priceE != null && item.priceE !== "") return Number(item.priceE);

      if(list==="4") return item.price4 ?? null;
      if(list==="5") return item.price5 ?? null;
      if(list==="6") return item.price6 ?? null;

      return null;
    }

    function descFor(code){
      const key = normCode(code);
      return (window.CATALOG || {})[key]?.desc ?? "";
    }

    // State
    const state = {
      list: "4",
      vat: 16,
      fx: 18.77,
      validity: "7 días",
      client: "",
      seller: "",
      lines: [{ code:"", qty: 1 }]
    };

    function render(){
      // --- Guardar foco (para no letra por letra) ---
      const ae = document.activeElement;
      const focusInfo =
        (ae && ae.getAttribute && ae.getAttribute("data-field") && ae.getAttribute("data-idx"))
          ? {
              field: ae.getAttribute("data-field"),
              idx: ae.getAttribute("data-idx"),
              start: ae.selectionStart,
              end: ae.selectionEnd
            }
          : null;

      $("today").textContent = new Date().toLocaleDateString("es-MX");
      $("validityOut").textContent = state.validity || "—";
      $("clientOut").textContent = state.client?.trim() || "—";
      $("sellerOut").textContent = state.seller?.trim() || "—";
      $("fxOut").textContent = money(state.fx || 0);
      $("vatOut").textContent = String(state.vat || 0);

      const tbody = $("lines");
      tbody.innerHTML = "";

      let subUsd = 0;
      const missing = [];

      state.lines.forEach((line, idx) => {
        const rawCode = line.code ?? "";
        const code = normCode(rawCode);
        const qty  = Number(line.qty || 0);

        const item = (window.CATALOG || {})[code];
        const price = priceFor(code, state.list);
        const desc = descFor(code);

        if(code && !item) missing.push(code + " (no existe)");
        if(item && (price === null || price === undefined)) missing.push(code + " (sin precio)");

        const lineSub = (price ?? 0) * qty;
        subUsd += lineSub;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>
            <input
              data-field="code"
              data-idx="${idx}"
              value="${escapeHtml(rawCode)}"
              placeholder="Código"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              oninput="onCode(${idx}, this.value)"
            />
          </td>
          <td class="muted">${escapeHtml(desc || "—")}</td>
          <td class="right">${price == null ? "—" : moneyUsd(price)}</td>
          <td class="right">
            <input
              data-field="qty"
              data-idx="${idx}"
              type="number"
              min="0"
              step="1"
              value="${qty}"
              oninput="onQty(${idx}, this.value)"
            />
          </td>
          <td class="right">${moneyUsd(lineSub)}</td>
          <td class="right no-print">
            <button class="secondary" onclick="removeLine(${idx})" style="padding:6px 10px; font-weight:800;">X</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      const totalUsd = subUsd; // sin descuento
      const subMxn = totalUsd * Number(state.fx || 0);
      const iva = subMxn * (Number(state.vat || 0) / 100);
      const totalMxn = subMxn + iva;

      $("subUsd").textContent = moneyUsd(subUsd);
      $("totalUsd").textContent = moneyUsd(totalUsd);
      $("subMxn").textContent = money(subMxn);
      $("ivaMxn").textContent = money(iva);
      $("totalMxn").textContent = money(totalMxn);

      const uniq = [...new Set(missing.filter(Boolean))];
      showWarning(uniq.length ? ("Ojo: códigos/precios no encontrados: " + uniq.join(", ")) : "");

      // --- Regresar foco después de re-render ---
      if (focusInfo) {
        const el = document.querySelector(
          `input[data-field="${focusInfo.field}"][data-idx="${focusInfo.idx}"]`
        );
        if (el) {
          el.focus();
          if (focusInfo.start != null && focusInfo.end != null && el.setSelectionRange) {
            el.setSelectionRange(focusInfo.start, focusInfo.end);
          }
        }
      }
    }

    // Handlers
    window.onCode = (idx, val) => {
      // Guardamos tal cual teclea, pero se busca con normCode()
      state.lines[idx].code = String(val || "");
      render();
    };

    window.onQty = (idx, val) => {
      state.lines[idx].qty = Number(val || 0);
      render();
    };

    window.removeLine = (idx) => {
      state.lines.splice(idx, 1);
      if(!state.lines.length) state.lines.push({ code:"", qty: 1 });
      render();
    };

    // Events
    $("priceList").addEventListener("change", e => { state.list = e.target.value; render(); });
    $("vatMode").addEventListener("change", e => { state.vat = Number(e.target.value || 0); render(); });
    $("fx").addEventListener("input", e => { state.fx = Number(e.target.value || 0); render(); });
    $("clientName").addEventListener("input", e => { state.client = e.target.value; render(); });
    $("sellerName").addEventListener("input", e => { state.seller = e.target.value; render(); });
    $("validity").addEventListener("input", e => { state.validity = e.target.value; render(); });

    $("addRowBtn").addEventListener("click", () => { state.lines.push({code:"", qty:1}); render(); });

    $("clearBtn").addEventListener("click", () => {
      state.client="";
      state.seller="";
      state.fx=18.77;
      state.list="4";
      state.vat=16;
      state.validity="7 días";
      state.lines=[{code:"", qty:1}];

      $("priceList").value="4";
      $("vatMode").value="16";
      $("clientName").value="";
      $("sellerName").value="";
      $("fx").value="18.77";
      $("validity").value="7 días";

      render();
    });

    $("printBtn").addEventListener("click", () => window.print());

    // init
    $("priceList").value = state.list;
    $("vatMode").value = String(state.vat);
    $("clientName").value = state.client;
    $("sellerName").value = state.seller;
    $("fx").value = String(state.fx);
    $("validity").value = state.validity;

    render();
  </script>
</body>
</html>
