<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cotizador</title>

<style>
:root { --b:#e5e7eb; --t:#111827; --m:#6b7280; }
*{ box-sizing:border-box; }
body{ margin:0; font-family:-apple-system,system-ui,Arial; background:#f7f7f8; color:var(--t); }
.wrap{ max-width:1200px; margin:0 auto; padding:16px; display:grid; grid-template-columns:420px 1fr; gap:14px; }
.card{ background:#fff; border:1px solid var(--b); border-radius:16px; padding:14px; box-shadow:0 6px 20px rgba(0,0,0,.05); }
h1{ font-size:18px; margin:0 0 8px; }
h2{ font-size:13px; margin:0 0 12px; color:var(--m); font-weight:600; }
label{ font-size:12px; color:var(--m); display:block; margin:10px 0 6px; }
input, select{ width:100%; padding:10px; border-radius:12px; border:1px solid var(--b); font-size:14px; }
.row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btns{ display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
button{ padding:10px 12px; border-radius:12px; border:1px solid var(--b); background:#111827; color:#fff; font-weight:700; cursor:pointer; }
button.secondary{ background:#fff; color:#111827; }
.small{ font-size:12px; color:var(--m); }
.quoteHeader{ display:flex; justify-content:space-between; }
.brand img{ height:70px; }
.hr{ height:1px; background:var(--b); margin:10px 0; }
table{ width:100%; border-collapse:collapse; }
th, td{ border-bottom:1px solid var(--b); padding:10px 8px; font-size:13px; }
th{ text-align:left; color:var(--m); font-weight:700; }
td.right, th.right{ text-align:right; }
.totals{ margin-top:10px; display:grid; gap:6px; }
.line{ display:flex; justify-content:space-between; }
.line.grand{ font-size:18px; font-weight:900; }
.no-print{}
@media print{
  .wrap{ grid-template-columns:1fr; }
  .card:first-child{ display:none; }
  .no-print{ display:none !important; }
}
</style>
</head>

<body>
<div class="wrap">

<!-- PANEL -->
<div class="card">
<h1>Cotizador</h1>
<h2>Captura códigos y genera PDF</h2>

<div class="row">
<div>
<label>Lista del cliente</label>
<select id="priceList">
<option value="4" selected>Lista 4</option>
<option value="5">Lista 5</option>
<option value="6">Lista 6</option>
</select>
</div>

<div>
<label>IVA</label>
<select id="vatMode">
<option value="16" selected>16%</option>
<option value="8">8%</option>
<option value="0">0%</option>
</select>
</div>
</div>

<label>Cliente</label>
<input id="clientName" />

<label>Vendedor</label>
<input id="sellerName" />

<div class="row">
<div>
<label>Tipo de cambio</label>
<input id="fx" type="number" step="0.01" value="18.77"/>
</div>
<div>
<label>Vigencia</label>
<input id="validity" value="7 días"/>
</div>
</div>

<div class="btns">
<button id="addRowBtn">+ Agregar renglón</button>
<button class="secondary" id="clearBtn">Limpiar todo</button>
</div>

</div>

<!-- COTIZACIÓN -->
<div class="card">

<div class="quoteHeader">
<div class="brand">
<img src="Logo%20Tishman%20Color-SF.png" onerror="this.style.display='none'">
</div>
<div style="text-align:right">
<div class="small">Fecha: <span id="today"></span></div>
<div class="small">Vigencia: <span id="validityOut"></span></div>
</div>
</div>

<div class="hr"></div>

<table>
<thead>
<tr>
<th>Código</th>
<th>Descripción</th>
<th class="right">Precio (USD)</th>
<th class="right">Cant.</th>
<th class="right">SubTotal</th>
<th class="right no-print">Quitar</th>
</tr>
</thead>
<tbody id="lines"></tbody>
</table>

<div class="totals">
<div class="line"><span>Sub Total USD</span><span id="subUsd">$0.00</span></div>
<div class="line"><span>Total USD</span><span id="totalUsd">$0.00</span></div>
<div class="line"><span>Sub Total MXP</span><span id="subMxn">$0.00</span></div>
<div class="line"><span>IVA</span><span id="ivaMxn">$0.00</span></div>
<div class="line grand"><span>TOTAL MXP</span><span id="totalMxn">$0.00</span></div>
</div>

<div class="btns no-print">
<button id="printBtn">Imprimir / Guardar PDF</button>
</div>

</div>
</div>

<script src="catalog.js"></script>
<script>

const $ = id => document.getElementById(id);

const state = {
list:"4",
vat:16,
fx:18.77,
validity:"7 días",
lines:[{code:"",qty:1}]
};

function money(n){ return "$"+Number(n||0).toFixed(2); }

function priceFor(code,list){
const item = CATALOG[code];
if(!item) return null;

/* 🔥 PRIORIDAD PRECIO ESPECIAL */
if(item.specialPrice != null && item.specialPrice !== "")
return Number(item.specialPrice);

/* Lista seleccionada */
if(list==="4") return item.price4 ?? null;
if(list==="5") return item.price5 ?? null;
if(list==="6") return item.price6 ?? null;

return null;
}

function render(){

$("today").textContent = new Date().toLocaleDateString("es-MX");
$("validityOut").textContent = state.validity;

const tbody = $("lines");
tbody.innerHTML="";

let subUsd=0;

state.lines.forEach((line,idx)=>{
const price = priceFor(line.code,state.list);
const desc = CATALOG[line.code]?.desc ?? "";

const subtotal=(price??0)*line.qty;
subUsd+=subtotal;

const tr=document.createElement("tr");
tr.innerHTML=`
<td><input value="${line.code}" oninput="state.lines[${idx}].code=this.value;render()"></td>
<td>${desc}</td>
<td class="right">${price==null?"—":money(price)}</td>
<td class="right"><input type="number" value="${line.qty}" min="0" oninput="state.lines[${idx}].qty=Number(this.value);render()"></td>
<td class="right">${money(subtotal)}</td>
<td class="right no-print"><button onclick="removeLine(${idx})">X</button></td>
`;
tbody.appendChild(tr);
});

const totalUsd=subUsd;
const subMxn=totalUsd*state.fx;
const iva=subMxn*(state.vat/100);
const totalMxn=subMxn+iva;

$("subUsd").textContent=money(subUsd);
$("totalUsd").textContent=money(totalUsd);
$("subMxn").textContent=money(subMxn);
$("ivaMxn").textContent=money(iva);
$("totalMxn").textContent=money(totalMxn);

}

function removeLine(i){
state.lines.splice(i,1);
if(!state.lines.length) state.lines.push({code:"",qty:1});
render();
}

$("priceList").addEventListener("change",e=>{state.list=e.target.value;render();});
$("vatMode").addEventListener("change",e=>{state.vat=Number(e.target.value);render();});
$("fx").addEventListener("input",e=>{state.fx=Number(e.target.value);render();});
$("validity").addEventListener("input",e=>{state.validity=e.target.value;render();});

$("addRowBtn").addEventListener("click",()=>{state.lines.push({code:"",qty:1});render();});
$("clearBtn").addEventListener("click",()=>{
state.lines=[{code:"",qty:1}];
render();
});

$("printBtn").addEventListener("click",()=>window.print());

render();

</script>
</body>
</html>
